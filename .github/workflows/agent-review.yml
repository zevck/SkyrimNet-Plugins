name: Agent content review

# Stage 2 of the review pipeline. Runs after validate.yml applies the
# ready-for-agent-review label to a PR. Reads the plugin's manifest and
# content files, concatenates the base agent prompt with the correct
# SFW/NSFW appendix, and sends batched chunks to gpt-4o-mini via
# GitHub Models to classify the content as approve/reject/uncertain.
#
# This workflow never runs on PRs labeled manual-review or validation-failed.
# See ai_docs/AGENT_REVIEW.md for the full design rationale.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  models: read

concurrency:
  group: agent-review-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only fire when the label added is ready-for-agent-review. Any other
    # label change is a no-op. This keeps the workflow from running on every
    # label addition (manual-review, validation-failed, curated, etc.).
    if: ${{ github.event.label.name == 'ready-for-agent-review' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          fetch-depth: 1

      - name: Checkout PR head (plugins only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          sparse-checkout: |
            plugins
          sparse-checkout-cone-mode: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # The agent review script has no npm dependencies — it uses only Node
      # built-ins (fs, path, and the global fetch). No install step needed.

      - name: Run agent review
        id: review
        env:
          BASE_DIR: ${{ github.workspace }}/base
          PR_DIR: ${{ github.workspace }}/pr
          RESULT_FILE: ${{ github.workspace }}/agent-review-result.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Model is configurable via repository variables so maintainers can
          # switch between gpt-4o-mini (default, cheap) and gpt-4o (more
          # expensive, potentially more accurate) without editing this file.
          AGENT_MODEL: ${{ vars.AGENT_MODEL || 'openai/gpt-4o-mini' }}
          # Chunk size in bytes — files are grouped at file boundaries into
          # chunks of this size. 80 KB leaves room for the ~5 KB system prompt
          # plus output tokens in gpt-4o-mini's 128K context.
          AGENT_CHUNK_SIZE_BYTES: "81920"
        run: |
          node "$BASE_DIR/.github/scripts/agent-review.mjs"
        continue-on-error: true

      - name: Apply labels and post comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = `${process.env.GITHUB_WORKSPACE}/agent-review-result.json`;

            if (!fs.existsSync(resultPath)) {
              core.setFailed('agent-review.mjs did not produce a result file');
              return;
            }

            const result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            const pr = context.issue;

            // Labels emitted by agent-review.yml:
            //   agent-approved   — all chunks returned "approve"
            //   agent-rejected   — at least one chunk returned "reject"
            //   agent-uncertain  — at least one chunk returned "uncertain",
            //                      or the review failed softly (API error,
            //                      rate limit, parse error, etc.)
            const ourLabels = new Set([
              'agent-approved',
              'agent-rejected',
              'agent-uncertain',
            ]);

            // Remove any of our labels that are currently on the PR but
            // aren't in the new result. This cleans up stale labels on re-run.
            const current = await github.rest.issues.listLabelsOnIssue({
              owner: pr.owner, repo: pr.repo, issue_number: pr.number,
            });
            const toRemove = current.data
              .map(l => l.name)
              .filter(n => ourLabels.has(n) && !result.labels.includes(n));
            for (const name of toRemove) {
              await github.rest.issues.removeLabel({
                owner: pr.owner, repo: pr.repo, issue_number: pr.number, name,
              });
            }

            // Apply the new labels
            if (result.labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: pr.owner, repo: pr.repo, issue_number: pr.number,
                labels: result.labels,
              });
            }

            // Post a comment explaining the decision
            if (result.comment) {
              await github.rest.issues.createComment({
                owner: pr.owner, repo: pr.repo, issue_number: pr.number,
                body: result.comment,
              });
            }

      - name: Fail job on review error
        if: always()
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/agent-review-result.json" ]; then
            echo "agent-review.mjs did not produce a result file"
            exit 1
          fi
          success=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/agent-review-result.json','utf8')).success)")
          # Agent review uses a different "success" semantic than validate.yml.
          # success=true means the review ran to completion and produced a
          # valid decision (approve OR reject OR uncertain — all are valid
          # outcomes). success=false means the review itself failed
          # structurally (script crashed, result malformed, etc.).
          if [ "$success" != "true" ]; then
            echo "Agent review script failed — see logs and PR comment for details"
            exit 1
          fi
