name: Auto-merge approved plugin

# Stage 3 of the review pipeline. Triggers when agent-review.yml applies the
# agent-approved label. Verifies no blocking labels are present, confirms the
# PR HEAD hasn't changed since review, and merges the PR.
#
# If the author pushes new commits after agent approval, validate.yml re-runs
# and removes the agent-approved label (resetting the pipeline). This workflow
# will not merge stale approvals.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-merge-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  merge:
    if: ${{ github.event.label.name == 'agent-approved' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for blocking labels
        id: check-labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue;

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: pr.owner, repo: pr.repo, issue_number: pr.number,
            });
            const labelNames = labels.map(l => l.name);

            // These labels block auto-merge. If any are present, the PR needs
            // human attention regardless of the agent-approved label.
            const blockers = [
              'validation-failed',
              'manual-review',
              'agent-rejected',
              'agent-uncertain',
            ];
            const found = blockers.filter(b => labelNames.includes(b));

            if (found.length > 0) {
              core.setFailed(`PR has blocking labels: ${found.join(', ')}. Skipping auto-merge.`);
              return;
            }

            // Verify the expected labels are present (sanity check that the
            // full pipeline actually ran).
            if (!labelNames.includes('ready-for-agent-review')) {
              core.setFailed('PR is missing ready-for-agent-review label. The validation pipeline may not have run.');
              return;
            }

            core.info('All checks passed — no blocking labels, pipeline labels present.');

      - name: Verify PR is mergeable
        id: check-mergeable
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            if (pr.merged) {
              core.setFailed('PR is already merged.');
              return;
            }

            if (pr.state !== 'open') {
              core.setFailed(`PR is ${pr.state}, not open.`);
              return;
            }

            // Check that the HEAD SHA matches what triggered this workflow.
            // If someone pushed new commits after agent-approved was applied,
            // the event's head SHA won't match the PR's current head SHA.
            const eventSha = '${{ github.event.pull_request.head.sha }}';
            if (pr.head.sha !== eventSha) {
              core.setFailed(
                `PR HEAD has changed since approval. ` +
                `Reviewed: ${eventSha.slice(0, 7)}, current: ${pr.head.sha.slice(0, 7)}. ` +
                `The PR needs to go through the review pipeline again.`
              );
              return;
            }

            if (!pr.mergeable) {
              core.setFailed('PR has merge conflicts. The author needs to rebase or resolve conflicts.');
              return;
            }

            core.info(`PR #${pr.number} is mergeable. HEAD: ${pr.head.sha.slice(0, 7)}`);

      - name: Merge PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.issue;
            const sha = '${{ github.event.pull_request.head.sha }}';

            try {
              await github.rest.pulls.merge({
                owner: pr.owner,
                repo: pr.repo,
                pull_number: pr.number,
                sha: sha,
                merge_method: 'squash',
              });
              core.info(`PR #${pr.number} merged successfully.`);
            } catch (e) {
              core.setFailed(`Merge failed: ${e.message}`);
            }
