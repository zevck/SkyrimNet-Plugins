name: Build plugin index

# Regenerates index.json from plugins/* + hidden.json. Cannot push to main
# directly because github-actions[bot] is not in the ruleset bypass list
# (and as a runtime identity, can't be added to the dropdown). Instead,
# the workflow:
#   1. pushes the rebuilt index.json to a fresh branch (no protection)
#   2. opens a PR for that branch
#   3. dispatches review-pipeline.yml against the PR via workflow_dispatch
#      — validate tags it as `index-rebuild`, agent-review short-circuit-
#      approves, auto-merge fires, the PR lands on main
#
# PRs opened with GITHUB_TOKEN don't fire pull_request events on
# downstream workflows, which is why the review pipeline is dispatched
# explicitly via workflow_dispatch here rather than relying on its
# pull_request trigger to pick up the rebuild PR on its own.
# (workflow_call would prefix check-run names with the calling job's
# name, which wouldn't match the ruleset's required-status-check names.)
#
# Triggers:
#   - push to main when plugins/** or hidden.json changes — catches
#     direct admin edits via the GitHub web UI.
#   - workflow_run after the review pipeline completes — catches plugin
#     submissions and deletions auto-merged by GITHUB_TOKEN, whose
#     pushes to main do NOT fire `push` events on downstream workflows.
#   - workflow_dispatch for manual rebuilds.

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'hidden.json'
  workflow_run:
    workflows: ['Plugin submission review pipeline']
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write   # needed to dispatch review-pipeline.yml against the rebuild PR

concurrency:
  group: build-index
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          # Full history needed for git log date derivation in build-index.mjs
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build index
        run: node .github/scripts/build-index.mjs

      - name: Open rebuild PR if index changed
        id: openpr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if git diff --quiet -- index.json; then
            echo "index.json unchanged — nothing to do"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH="index-rebuild/${GITHUB_RUN_ID}"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add index.json
          git commit -m "chore: rebuild index.json"
          git push origin "$BRANCH"

          BODY=$(cat <<EOF
          Automated rebuild after a change to \`plugins/**\` or \`hidden.json\`.

          Triggered by: \`${GITHUB_EVENT_NAME}\` (run id ${GITHUB_RUN_ID}).

          The review pipeline is dispatched against this PR by the same
          workflow run; it routes the PR as \`index-rebuild\`, agent-review
          short-circuit-approves, and auto-merge lands it.
          EOF
          )
          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: rebuild index.json" \
            --body "$BODY")
          PR_NUMBER=$(basename "$PR_URL")
          echo "Opened PR #${PR_NUMBER}: ${PR_URL}"
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Dispatch review pipeline against rebuild PR
        if: steps.openpr.outputs.pr_number != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER:    ${{ steps.openpr.outputs.pr_number }}
        run: |
          set -euo pipefail
          # Dispatch on main so the workflow file resolved is the trusted
          # version. The review pipeline's setup job then looks up the
          # rebuild PR by number and proceeds.
          gh workflow run review-pipeline.yml \
            --ref main \
            -f pr_number="$PR_NUMBER"
          echo "Dispatched review-pipeline.yml against PR #$PR_NUMBER"
