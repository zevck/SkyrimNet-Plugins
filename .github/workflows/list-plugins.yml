name: List plugins (moderator reference)

# Manually triggered companion to the Moderate workflow. Walks index.json,
# hidden.json, curated.json, and bans.json and dumps a markdown table to
# the run summary tab so moderators can copy a plugin id / author string
# without having to browse the repo. Read-only — never touches main.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Render plugin list
        run: node .github/scripts/moderate-list.mjs
