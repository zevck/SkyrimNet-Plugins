name: Moderate

# Manual moderation actions. Only runs via workflow_dispatch — anyone with
# repo write access can invoke it from the Actions tab. The workflow uses
# the built-in GITHUB_TOKEN to commit directly to main, which sidesteps
# classic branch-protection "require a PR" gymnastics and keeps the
# moderator credential (the token) confined to a single run.
#
# Typical flow:
#   1. Run "List plugins (moderator reference)" to see the current hub state
#      in the run summary. Copy the plugin_id or author of interest.
#   2. Run this workflow with the desired action + target + reason.
#   3. The change lands on main within ~20s; dashboards pick it up on the
#      next cache-busted fetch.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        required: true
        options:
          - hide
          - unhide
          - curate
          - uncurate
          - ban
          - unban
      plugin_id:
        description: "Plugin id (for hide/unhide/curate/uncurate). Shape: plugins/{author}/{slug}"
        type: string
        required: false
      author:
        description: "Author username (for ban/unban)"
        type: string
        required: false
      reason:
        description: "Short reason. Shown to the plugin owner on hide; recorded in JSON for curate/ban."
        type: string
        required: false

permissions:
  contents: write        # push moderation branch
  pull-requests: write   # open + merge the moderation PR

concurrency:
  group: moderate
  cancel-in-progress: false

env:
  # Silence the Node 20 deprecation warning on actions/checkout +
  # actions/setup-node. Safe to enable now; will become default June 2026.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  moderate:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure git committer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply moderation action
        env:
          MOD_ACTION:     ${{ github.event.inputs.action }}
          MOD_PLUGIN_ID:  ${{ github.event.inputs.plugin_id }}
          MOD_AUTHOR:     ${{ github.event.inputs.author }}
          MOD_REASON:     ${{ github.event.inputs.reason }}
          MOD_ACTOR:      ${{ github.actor }}
        run: node .github/scripts/moderate-apply.mjs

      - name: Commit to a short-lived branch
        id: commit
        run: |
          set -e
          for f in hidden.json curated.json bans.json; do
            if [ -f "$f" ]; then git add "$f"; fi
          done
          if git diff --cached --quiet; then
            echo "No file changes produced by the moderation action."
            echo "skip=1" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ ! -f .moderate-commit-message.txt ]; then
            echo "Expected .moderate-commit-message.txt but it is missing — apply script failed silently."
            exit 1
          fi
          subject=$(head -n1 .moderate-commit-message.txt)
          body=$(tail -n +2 .moderate-commit-message.txt)
          branch="moderate/$(date -u +%Y%m%d%H%M%S)-${{ github.run_id }}"
          git checkout -b "$branch"
          git commit -m "$subject (by ${{ github.actor }})" ${body:+-m "$body"}
          rm -f .moderate-commit-message.txt
          git push -u origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "subject=$subject" >> "$GITHUB_OUTPUT"

      # Open and merge the moderation PR via the API. Rulesets on main that
      # require "a pull request before merging" block direct pushes from any
      # actor, including GITHUB_TOKEN — that's load-bearing protection against
      # a compromised App writing directly to main. This workflow respects the
      # rule: it opens a PR (bypassing nothing), then merges it via the API
      # with the GITHUB_TOKEN, which is allowed because merging a PR is not a
      # direct push. External contributors can't invoke workflow_dispatch
      # (requires write access), so this path isn't reachable by untrusted
      # actors even if they compromise the dashboard App.
      - name: Open and merge PR
        if: steps.commit.outputs.skip != '1'
        uses: actions/github-script@v7
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          SUBJECT: ${{ steps.commit.outputs.subject }}
          MOD_ACTION: ${{ github.event.inputs.action }}
          MOD_PLUGIN_ID: ${{ github.event.inputs.plugin_id }}
          MOD_AUTHOR: ${{ github.event.inputs.author }}
          MOD_REASON: ${{ github.event.inputs.reason }}
        with:
          script: |
            const { BRANCH, SUBJECT, MOD_ACTION, MOD_PLUGIN_ID, MOD_AUTHOR, MOD_REASON } = process.env;
            const body = [
              `Moderation action invoked by @${context.actor}.`,
              '',
              `- **Action:** \`${MOD_ACTION}\``,
              MOD_PLUGIN_ID ? `- **Plugin:** \`${MOD_PLUGIN_ID}\`` : '',
              MOD_AUTHOR ? `- **Author:** \`${MOD_AUTHOR}\`` : '',
              MOD_REASON ? `- **Reason:** ${MOD_REASON}` : '',
              '',
              'Auto-merged by the Moderate workflow. This PR exists solely to satisfy the main-branch ruleset.',
            ].filter(Boolean).join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: SUBJECT,
              body,
              head: BRANCH,
              base: 'main',
            });
            core.info(`Opened PR #${pr.number}`);

            // Auto-merge is best-effort. The main-branch ruleset requires an
            // approving review from a non-author, which GITHUB_TOKEN cannot
            // satisfy — that's a deliberate protection that also stops a
            // compromised App from auto-merging its own PRs. When the merge
            // is blocked by the ruleset, this step exits SUCCESSFULLY with a
            // "needs manual approval + merge" note so the run isn't a noisy
            // red failure for the expected path.
            let merged = false;
            for (let attempt = 0; attempt < 5; attempt++) {
              try {
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                });
                merged = true;
                break;
              } catch (e) {
                const status = e.status || 0;
                if (status === 405 || status === 409) {
                  // 405: mergeability still computing (transient)
                  // 409: head changed mid-flight
                  core.info(`Merge attempt ${attempt + 1} got ${status}; retrying in 2s...`);
                  await new Promise((r) => setTimeout(r, 2000));
                  continue;
                }
                // Any other error (e.g. "required approving review" from the
                // ruleset) is the expected degraded path — stop trying, let
                // the maintainer finish by hand.
                core.info(`Auto-merge blocked: ${e.message}`);
                core.info(`PR #${pr.number} opened at ${pr.html_url}. Approve and merge it by hand to finalise the moderation action.`);
                break;
              }
            }

            if (merged) {
              core.info(`Merged PR #${pr.number}`);
            } else {
              core.notice(
                `Moderation PR opened and waiting for manual approve + merge: ${pr.html_url}`,
                { title: 'Needs manual merge' },
              );
            }
            core.setOutput('pr_url', pr.html_url);
            core.setOutput('pr_number', pr.number);
            core.setOutput('merged', merged ? 'true' : 'false');

            // Only delete the branch if we actually merged — if it's waiting
            // for manual merge, the branch needs to stay live.
            if (!merged) return;
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${BRANCH}`,
              });
              core.info(`Deleted branch ${BRANCH}`);
            } catch (e) {
              core.info(`Could not delete branch ${BRANCH}: ${e.message}`);
            }

      - name: Summary
        if: always()
        run: |
          echo "### Moderation action" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Action:** \`${{ github.event.inputs.action }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Plugin id:** \`${{ github.event.inputs.plugin_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Author:** \`${{ github.event.inputs.author }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Reason:** ${{ github.event.inputs.reason }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Invoked by:** \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
