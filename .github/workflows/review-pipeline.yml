name: Plugin submission review pipeline

# Unified review pipeline — validate → agent-review → auto-merge as three
# sequential jobs in one workflow. Each job decides whether the next should
# run via job outputs, not via label events (labels applied by GITHUB_TOKEN
# do not trigger downstream workflows, which is why the pipeline is
# consolidated here).
#
# Labels are still applied at each stage for human visibility:
#   validate     -> validation-failed | ready-for-agent-review | manual-review
#   agent-review -> agent-approved    | agent-rejected         | agent-uncertain
#
# See ai_docs/AGENT_REVIEW.md for the agent review design rationale.

on:
  pull_request:
    types: [opened, synchronize, reopened]
    # No paths-ignore: the pipeline must run on every PR so the
    # `agent-review` required status check always reports. Moderation
    # PRs (touching only hidden.json/curated.json/bans.json/etc.) are
    # detected by validate.mjs as `infra-only` and short-circuit-
    # approved by agent-review.mjs without an LLM call. CODEOWNERS still
    # gates the actual merge, and auto-merge skips infra-only routes.
  # Manual / programmatic entry point: lets another workflow (notably
  # build-index.yml) drive the pipeline against a PR it just opened.
  # PRs opened with GITHUB_TOKEN don't fire pull_request events on
  # downstream workflows, so we expose this entry point as the workaround.
  #
  # workflow_dispatch (rather than workflow_call) is used deliberately:
  # workflow_call jobs report check runs with the calling job's name as
  # a prefix (e.g. `review / validate`), which wouldn't match the
  # ruleset's required-status-check names. workflow_dispatch starts a
  # top-level workflow run, so checks report as bare `validate` and
  # `agent-review`. The setup job below resolves PR context the same
  # way regardless of trigger.
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to review'
        type: string
        required: true

permissions:
  contents: write        # auto-merge job writes to the repo
  pull-requests: write   # label + comment + merge
  models: read           # agent-review uses GitHub Models

concurrency:
  # Resolves to PR number on either trigger.
  group: review-pr-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Stage 0 — resolve PR context (works for both pull_request and workflow_call)
  #
  # For the pull_request trigger we already have github.event.pull_request
  # populated. For workflow_call we only have inputs.pr_number, so we look
  # up the PR via the API. Either way, downstream jobs read from this job's
  # outputs and don't touch github.event.pull_request directly.
  # ---------------------------------------------------------------------------
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      pr_number: ${{ steps.ctx.outputs.pr_number }}
      head_sha:  ${{ steps.ctx.outputs.head_sha }}
      head_ref:  ${{ steps.ctx.outputs.head_ref }}
      base_sha:  ${{ steps.ctx.outputs.base_sha }}
      author:    ${{ steps.ctx.outputs.author }}
      body:      ${{ steps.ctx.outputs.body }}

    steps:
      - name: Resolve PR context
        id: ctx
        uses: actions/github-script@v7
        with:
          script: |
            // pull_request trigger has the PR in the event payload;
            // workflow_dispatch carries it through inputs.pr_number.
            const isDispatch = context.eventName === 'workflow_dispatch';
            const prNumber = isDispatch
              ? Number(${{ toJSON(inputs.pr_number || '0') }})
              : context.payload.pull_request.number;
            if (!prNumber) {
              core.setFailed('Could not determine PR number from event or inputs.');
              return;
            }
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('head_sha',  pr.head.sha);
            core.setOutput('head_ref',  pr.head.ref);
            core.setOutput('base_sha',  pr.base.sha);
            core.setOutput('author',    pr.user.login);
            core.setOutput('body',      pr.body || '');

  # ---------------------------------------------------------------------------
  # Stage 1 — structural validation
  # ---------------------------------------------------------------------------
  validate:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      route: ${{ steps.route.outputs.route }}
      plugin_root: ${{ steps.route.outputs.plugin_root }}

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.base_sha }}
          path: base
          fetch-depth: 0

      - name: Checkout PR head (plugins only)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.head_sha }}
          path: pr
          sparse-checkout: |
            plugins
          sparse-checkout-cone-mode: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: base/.github/scripts/package-lock.json

      - name: Install validator dependencies
        working-directory: base/.github/scripts
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: List PR changed files
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
              per_page: 100,
            });
            // Emit "status\tfilename" per line so the validator can tell
            // deletions from additions/modifications. Deletion PRs (hub takedown)
            // show up as all-removed rows and validate.mjs special-cases them.
            const lines = files.map(f => `${f.status}\t${f.filename}`);
            require('fs').writeFileSync(
              `${process.env.GITHUB_WORKSPACE}/pr-files.txt`,
              lines.join('\n'),
            );

      - name: Run validation
        id: validate
        env:
          PR_AUTHOR: ${{ needs.setup.outputs.author }}
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          PR_BODY: ${{ needs.setup.outputs.body }}
          BASE_DIR: ${{ github.workspace }}/base
          PR_DIR: ${{ github.workspace }}/pr
          PR_FILES_FILE: ${{ github.workspace }}/pr-files.txt
          RESULT_FILE: ${{ github.workspace }}/validate-result.json
        run: node "$BASE_DIR/.github/scripts/validate.mjs"
        continue-on-error: true

      - name: Apply labels and post comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          HEAD_REF:  ${{ needs.setup.outputs.head_ref }}
        with:
          script: |
            const fs = require('fs');
            const resultPath = `${process.env.GITHUB_WORKSPACE}/validate-result.json`;
            if (!fs.existsSync(resultPath)) {
              core.setFailed('validate.mjs did not produce a result file');
              return;
            }
            const result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const issueNumber = Number(process.env.PR_NUMBER);

            // All labels the whole pipeline (any job) can apply. Cleared at
            // validate stage so each run starts from a known state.
            const ourLabels = new Set([
              'validation-failed',
              'ready-for-agent-review',
              'manual-review',
              'infra-only',
              'index-rebuild',
              'agent-approved',
              'agent-rejected',
              'agent-uncertain',
            ]);

            const current = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: issueNumber,
            });
            const toRemove = current.data
              .map(l => l.name)
              .filter(n => ourLabels.has(n) && !result.labels.includes(n));
            for (const name of toRemove) {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name,
              });
            }
            if (result.labels.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber,
                labels: result.labels,
              });
            }
            if (result.comment) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: result.comment,
              });
            }

            // Hard validation failure: structural rejection that no reviewer
            // should look at — close the PR so the dashboard's "Pending" list
            // doesn't leave the author's submission dangling, then delete the
            // head branch. Authors are directed by the PR comment to
            // re-publish from the dashboard (which opens a fresh branch)
            // rather than push to this one.
            if (result.labels.includes('validation-failed')) {
              await github.rest.pulls.update({
                owner, repo, pull_number: issueNumber, state: 'closed',
              });
              try {
                await github.rest.git.deleteRef({
                  owner, repo,
                  ref: `heads/${process.env.HEAD_REF}`,
                });
              } catch (e) {
                core.info(`Could not delete rejected head branch: ${e.message}`);
              }
            }

      # Surface manifest.invocation in the PR body so reviewers don't have to
      # open the JSON file to see what the action does, which mods it calls
      # into, and whether the author attested to testing. Only runs when
      # validation passed and the plugin contains actions.
      - name: Inject invocation summary into PR body
        if: always()
        uses: actions/github-script@v7
        env:
          PR_DIR: ${{ github.workspace }}/pr
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Locate the single plugin dir under plugins/{author}/{slug}/.
            const pluginsRoot = path.join(process.env.PR_DIR, 'plugins');
            if (!fs.existsSync(pluginsRoot)) return;
            let pluginDir = null;
            for (const author of fs.readdirSync(pluginsRoot)) {
              const authorDir = path.join(pluginsRoot, author);
              if (!fs.statSync(authorDir).isDirectory()) continue;
              for (const slug of fs.readdirSync(authorDir)) {
                const slugDir = path.join(authorDir, slug);
                if (fs.statSync(slugDir).isDirectory()) { pluginDir = slugDir; break; }
              }
              if (pluginDir) break;
            }
            if (!pluginDir) return;

            const manifestPath = path.join(pluginDir, 'manifest.json');
            if (!fs.existsSync(manifestPath)) return;
            let manifest;
            try {
              manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
            } catch (e) {
              console.log(`Could not parse manifest.json: ${e.message}`);
              return;
            }
            const inv = manifest.invocation;
            if (!inv) return;

            const lines = ['<!-- invocation-summary:start -->', '## Action Review Details', ''];
            if (inv.purpose) {
              lines.push('**Purpose**', '', inv.purpose, '');
            }
            if (Array.isArray(inv.actions) && inv.actions.length > 0) {
              lines.push('**Actions**', '');
              for (const a of inv.actions) {
                lines.push(`- \`${a.file}\``);
                if (a.vanilla === true) {
                  lines.push('  - Vanilla Papyrus only (no community mod).');
                } else if (Array.isArray(a.source_mods) && a.source_mods.length > 0) {
                  for (const m of a.source_mods) {
                    lines.push(`  - [${m.name}](${m.url})`);
                  }
                }
              }
              lines.push('');
            }
            if (inv.attestation) {
              lines.push('**Author attestation**', '', `> ${inv.attestation}`, '');
            }
            lines.push('<!-- invocation-summary:end -->');
            const block = lines.join('\n');

            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = Number(process.env.PR_NUMBER);
            const { data: prData } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            const existing = prData.body || '';
            const re = /<!-- invocation-summary:start -->[\s\S]*?<!-- invocation-summary:end -->/;
            const nextBody = re.test(existing)
              ? existing.replace(re, block)
              : (existing.trim() ? `${existing.trim()}\n\n${block}\n` : `${block}\n`);
            if (nextBody !== existing) {
              await github.rest.pulls.update({
                owner, repo, pull_number: prNumber, body: nextBody,
              });
            }

      - name: Determine route for next stage
        id: route
        if: always()
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/validate-result.json" ]; then
            echo "validate.mjs did not produce a result file"
            echo "route=validation-failed" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          success=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/validate-result.json','utf8')).success)")
          labels=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/validate-result.json','utf8')).labels.join(','))")
          plugin_root=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/validate-result.json','utf8')).plugin_root || '')")
          echo "plugin_root=$plugin_root" >> "$GITHUB_OUTPUT"

          route="validation-failed"
          if [ "$success" = "true" ]; then
            case ",$labels," in
              *,deletion,*)               route="deletion" ;;
              *,index-rebuild,*)          route="index-rebuild" ;;
              *,ready-for-agent-review,*) route="ready-for-agent-review" ;;
              *,infra-only,*)             route="infra-only" ;;
              *,manual-review,*)          route="manual-review" ;;
              *)                          route="manual-review" ;;
            esac
          fi
          echo "route=$route" >> "$GITHUB_OUTPUT"

          if [ "$success" != "true" ]; then
            echo "Validation failed — see annotations and PR comment for details"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Stage 2 — agent content review
  # ---------------------------------------------------------------------------
  agent-review:
    # Always runs (no `if:` gate). The job branches internally on the
    # validate-emitted route: real LLM scan for ready-for-agent-review,
    # short-circuit pass for deletion / index-rebuild, short-circuit fail
    # for everything else. This makes the agent-review job's success /
    # failure status usable as a required-status-check merge gate —
    # passes only when the PR should auto-merge, fails when it should
    # wait for a human.
    needs: [setup, validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      decision: ${{ steps.decision.outputs.decision }}

    steps:
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.base_sha }}
          path: base
          fetch-depth: 1

      - name: Checkout PR head (plugins only)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.setup.outputs.head_sha }}
          path: pr
          sparse-checkout: |
            plugins
          sparse-checkout-cone-mode: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run agent review
        id: review
        env:
          BASE_DIR: ${{ github.workspace }}/base
          PR_DIR: ${{ github.workspace }}/pr
          # validate.mjs already identified which plugins/{author}/{slug}/ dir
          # the PR modifies; pass it through so agent-review reviews that
          # exact directory instead of walking the filesystem (which also
          # contains every other plugin on main from the sparse checkout).
          PLUGIN_ROOT: ${{ needs.validate.outputs.plugin_root }}
          # Route from validate stage. The script branches on this:
          #   ready-for-agent-review -> real LLM scan
          #   deletion               -> short-circuit approve (no LLM call)
          #   index-rebuild          -> short-circuit approve (build-index PR)
          #   anything else          -> short-circuit uncertain (gate fails)
          ROUTE: ${{ needs.validate.outputs.route }}
          RESULT_FILE: ${{ github.workspace }}/agent-review-result.json
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Model is configurable via repository variables so maintainers can
          # switch models without editing this file. Defaults to gpt-4.1 which
          # tested at 98.8% accuracy across 81 runs on dark lore, NSFW, and
          # rejection scenarios.
          AGENT_MODEL: ${{ vars.AGENT_MODEL || 'openai/gpt-4.1' }}
          AGENT_CHUNK_SIZE_BYTES: "81920"
        run: node "$BASE_DIR/.github/scripts/agent-review.mjs"
        continue-on-error: true

      - name: Apply labels and post comment
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.setup.outputs.pr_number }}
          HEAD_REF:  ${{ needs.setup.outputs.head_ref }}
        with:
          script: |
            const fs = require('fs');
            const resultPath = `${process.env.GITHUB_WORKSPACE}/agent-review-result.json`;
            if (!fs.existsSync(resultPath)) {
              core.setFailed('agent-review.mjs did not produce a result file');
              return;
            }
            const result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const issueNumber = Number(process.env.PR_NUMBER);

            const ourLabels = new Set([
              'agent-approved',
              'agent-rejected',
              'agent-uncertain',
            ]);
            const current = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: issueNumber,
            });
            const toRemove = current.data
              .map(l => l.name)
              .filter(n => ourLabels.has(n) && !result.labels.includes(n));
            for (const name of toRemove) {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: issueNumber, name,
              });
            }
            if (result.labels.length > 0) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: issueNumber,
                labels: result.labels,
              });
            }
            if (result.comment) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: result.comment,
              });
            }

            // Agent hard-rejection: content violates the forbidden list, not
            // a marginal call. Close the PR, then delete the head branch —
            // authors re-publish from the dashboard (fresh branch) rather
            // than push to this one. agent-uncertain stays open because a
            // human still needs to look at it; only agent-rejected is
            // auto-closed here.
            if (result.labels.includes('agent-rejected')) {
              await github.rest.pulls.update({
                owner, repo, pull_number: issueNumber, state: 'closed',
              });
              try {
                await github.rest.git.deleteRef({
                  owner, repo,
                  ref: `heads/${process.env.HEAD_REF}`,
                });
              } catch (e) {
                core.info(`Could not delete rejected head branch: ${e.message}`);
              }
            }

      - name: Determine decision for next stage
        id: decision
        if: always()
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/agent-review-result.json" ]; then
            echo "agent-review.mjs did not produce a result file"
            echo "decision=agent-uncertain" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          labels=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/agent-review-result.json','utf8')).labels.join(','))")

          decision="agent-uncertain"
          case ",$labels," in
            *,agent-approved,*)  decision="agent-approved" ;;
            *,agent-rejected,*)  decision="agent-rejected" ;;
            *,agent-uncertain,*) decision="agent-uncertain" ;;
          esac
          echo "decision=$decision" >> "$GITHUB_OUTPUT"

          # The agent-review job is configured as a required status check on
          # main. Required-status-checks consume the job's success/failure
          # conclusion — not its outputs — so we make the conclusion match
          # the merge gate: pass only on agent-approved, fail otherwise.
          # agent-rejected and agent-uncertain both block the merge; only
          # uncertain leaves the PR open for a human to look at, but that
          # decision is enforced by the auto-merge job's `if:`, not here.
          if [ "$decision" != "agent-approved" ]; then
            echo "Decision is '$decision' — failing the job so the merge gate stays closed."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Stage 3 — auto-merge
  # ---------------------------------------------------------------------------
  auto-merge:
    needs: [setup, validate, agent-review]
    # agent-review is the single gate. It approves only on routes the bot
    # can ship on its own (ready-for-agent-review with a passing LLM scan,
    # deletion takedowns, or index-rebuild PRs from build-index.yml). It
    # short-circuit-fails everything else, including infra-only PRs —
    # those are merged by a repo admin via the bypass button, never by
    # the bot.
    if: needs.agent-review.result == 'success' && needs.agent-review.outputs.decision == 'agent-approved'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify PR is mergeable and merge
        uses: actions/github-script@v7
        env:
          PR_NUMBER:        ${{ needs.setup.outputs.pr_number }}
          REVIEWED_HEAD_SHA: ${{ needs.setup.outputs.head_sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const prNumber = Number(process.env.PR_NUMBER);
            const reviewedSha = process.env.REVIEWED_HEAD_SHA;

            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });

            if (pr.merged) {
              core.setFailed('PR is already merged.');
              return;
            }
            if (pr.state !== 'open') {
              core.setFailed(`PR is ${pr.state}, not open.`);
              return;
            }

            // Head SHA must match what was reviewed — if the author pushed
            // new commits, the pipeline restarts on the new HEAD so that
            // run will make the merge decision.
            if (pr.head.sha !== reviewedSha) {
              core.setFailed(
                `PR HEAD has changed since approval. ` +
                `Reviewed: ${reviewedSha.slice(0, 7)}, current: ${pr.head.sha.slice(0, 7)}.`,
              );
              return;
            }

            if (!pr.mergeable) {
              core.setFailed('PR has merge conflicts. Author must rebase or resolve.');
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner, repo,
                pull_number: pr.number,
                sha: reviewedSha,
                merge_method: 'squash',
              });
              core.info(`PR #${pr.number} merged.`);
            } catch (e) {
              core.setFailed(`Merge failed: ${e.message}`);
              return;
            }

            // The repo's "Automatically delete head branches" setting only
            // fires for UI merges, not API merges triggered by a GitHub
            // Action using GITHUB_TOKEN. Delete the ref explicitly so bot-
            // merged submission branches don't pile up. Fails softly: if
            // the branch is already gone or on a fork, we just log.
            try {
              await github.rest.git.deleteRef({
                owner, repo,
                ref: `heads/${pr.head.ref}`,
              });
              core.info(`Deleted head branch '${pr.head.ref}'.`);
            } catch (e) {
              core.info(`Could not delete head branch '${pr.head.ref}': ${e.message}`);
            }

  # ---------------------------------------------------------------------------
  # Index rebuilds happen in build-index.yml, which listens for this
  # pipeline's completion via a workflow_run trigger. That workflow opens
  # an "index-rebuild" PR that an admin merges via bypass — there is no
  # post-merge step here because github-actions[bot] cannot push to main
  # under the active ruleset.
  # ---------------------------------------------------------------------------
