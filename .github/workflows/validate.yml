name: Validate plugin submission

# Runs on every PR against main. Uses the `pull_request` trigger deliberately
# (not `pull_request_target`) so we never run PR-supplied code with upstream
# secrets. The only code that executes is validate.mjs checked out from the
# base branch.
on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      # The base branch (main). This is the trusted side — schemas, scripts,
      # and index.json we read here cannot be influenced by the PR.
      - name: Checkout base
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base
          fetch-depth: 0

      # The PR head. Only the plugins/ directory is needed — nothing in
      # .github/, schemas/, or any other infra path is ever consumed from the
      # PR side. Sparse checkout keeps this explicit.
      - name: Checkout PR head (plugins only)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr
          sparse-checkout: |
            plugins
          sparse-checkout-cone-mode: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: base/.github/scripts/package-lock.json

      # Install deps from base (the upstream package.json + lockfile).
      # PR-supplied package.json is never consulted — it's not even checked
      # out thanks to sparse-checkout above.
      - name: Install validator dependencies
        working-directory: base/.github/scripts
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Run validation
        id: validate
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_DIR: ${{ github.workspace }}/base
          PR_DIR: ${{ github.workspace }}/pr
          RESULT_FILE: ${{ github.workspace }}/validate-result.json
        run: |
          node "$BASE_DIR/.github/scripts/validate.mjs"
        # Do not fail the step on non-zero exit — the result file drives
        # labeling and comment posting, and we want labels applied even on
        # validation failures. The final "Fail job on validation error" step
        # below checks the result and sets the job status.
        continue-on-error: true

      - name: Apply labels and post comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = `${process.env.GITHUB_WORKSPACE}/validate-result.json`;

            if (!fs.existsSync(resultPath)) {
              core.setFailed('validate.mjs did not produce a result file');
              return;
            }

            const result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
            const pr = context.issue;

            // Labels managed by the review pipeline. validate.yml emits
            // the first three; agent-review.yml emits the last three.
            // When validate re-runs (author pushed new commits), ALL
            // pipeline labels are cleaned up so the review starts fresh.
            const ourLabels = new Set([
              'validation-failed',
              'ready-for-agent-review',
              'manual-review',
              'agent-approved',
              'agent-rejected',
              'agent-uncertain',
            ]);

            // Remove any of our labels that are currently on the PR but
            // shouldn't be after this run.
            const current = await github.rest.issues.listLabelsOnIssue({
              owner: pr.owner, repo: pr.repo, issue_number: pr.number,
            });
            const toRemove = current.data
              .map(l => l.name)
              .filter(n => ourLabels.has(n) && !result.labels.includes(n));
            for (const name of toRemove) {
              await github.rest.issues.removeLabel({
                owner: pr.owner, repo: pr.repo, issue_number: pr.number, name,
              });
            }

            // Apply the new labels
            if (result.labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: pr.owner, repo: pr.repo, issue_number: pr.number,
                labels: result.labels,
              });
            }

            // Post a comment iff there's something meaningful to say
            // (errors, or an explanation of why the PR routed to manual).
            // No comment on clean dashboard submissions — the green check
            // and labels are enough.
            if (result.comment) {
              await github.rest.issues.createComment({
                owner: pr.owner, repo: pr.repo, issue_number: pr.number,
                body: result.comment,
              });
            }

      - name: Fail job on validation error
        if: always()
        run: |
          if [ ! -f "$GITHUB_WORKSPACE/validate-result.json" ]; then
            echo "validate.mjs did not produce a result file"
            exit 1
          fi
          success=$(node -e "console.log(JSON.parse(require('fs').readFileSync('$GITHUB_WORKSPACE/validate-result.json','utf8')).success)")
          if [ "$success" != "true" ]; then
            echo "Validation failed — see annotations and PR comment for details"
            exit 1
          fi
