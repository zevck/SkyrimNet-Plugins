name: "healing_spell_narration"
description: "Narrate when the player casts a healing spell"
eventCriteria:
  eventType: "spell_cast"
  schemaConditions:
    - fieldPath: "spell"
      operator: "contains"
      value: "Heal"
      caseSensitive: false
    - fieldPath: "actor"
      operator: "equals"
      value: "{{ player_name }}"
response:
  type: "direct_narration"
  content: "*Warm golden light flows from {{ player_name }}'s hands as the healing magic takes effect.*"
audience: "nearby_npcs"
enabled: true
probability: 0.5
cooldownSeconds: 60
priority: 1
