name: W_BracedPain
description: The player braces in pain.
eventCriteria:
  eventType: active_effect
  schemaConditions:
    - fieldPath: effect
      operator: equals
      value: Braced Pain
      caseSensitive: false
    - fieldPath: action
      operator: equals
      value: applied
audience: player
response:
  type: player_dialogue
  content: "{{player_name}} screams in pain."
enabled: false
cooldownSeconds: 30