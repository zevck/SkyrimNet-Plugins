name: "contract_complete_reaction"
description: "Brotherhood members react when the player completes a contract"
eventCriteria:
  eventType: "quest_stage_complete"
  schemaConditions:
    - fieldPath: "questId"
      operator: "contains"
      value: "DB"
response:
  type: "player_dialogue"
  content: "Well done. The Night Mother smiles upon your work."
audience: "nearby_npcs"
enabled: true
probability: 0.8
cooldownSeconds: 120
